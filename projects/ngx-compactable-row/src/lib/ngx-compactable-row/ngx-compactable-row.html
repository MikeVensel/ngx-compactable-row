<div class="toolbar-items">
  <!-- Start menu button template. -->
  <ng-template #menuTriggerTemplate>
    @if (showMenu()) {
      <button #menuButton mat-icon-button [matMenuTriggerFor]="moreMenu">
        <mat-icon>more_vert</mat-icon>
      </button>
    }
  </ng-template>
  <!-- End menu button template. -->

  @if (menuButtonPosition() === 'start') {
    <ng-container [ngTemplateOutlet]="menuTriggerTemplate"></ng-container>
  }

  @for (item of projectedRootItems(); track item.id) {
    <span
      class="projected-item-host"
      [attr.data-toolbar-location]="'toolbar'"
      [ngxCompactableProjectedItem]="item.id"
    >
      <ng-container
        [ngTemplateOutlet]="item.template.template"
        [ngTemplateOutletContext]="{
          location: 'toolbar',
          priority: item.template.priority(),
          index: item.id,
        }"
      ></ng-container>
    </span>
  }

  @if (menuButtonPosition() === 'end') {
    <ng-container [ngTemplateOutlet]="menuTriggerTemplate"></ng-container>
  }

  <mat-menu #moreMenu="matMenu">
    <ng-template matMenuContent>
      @for (item of projectedMenuItems(); track item.id) {
        <ng-container
          [ngTemplateOutlet]="item.template.template"
          [ngTemplateOutletContext]="{
            location: 'menu',
            priority: item.template.priority(),
            index: item.id,
          }"
        ></ng-container>
      }
    </ng-template>
  </mat-menu>
</div>
