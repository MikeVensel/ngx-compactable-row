# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI

on:
  push:
    branches:
      - 'master'
  pull_request:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-24.11.0-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-yarn-
      - run: corepack enable
      - run: yarn install --immutable
        if: steps.deps-cache.outputs.cache-hit != 'true'
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-24.11.0-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-yarn-
      - run: corepack enable
      - run: yarn install --immutable
        if: steps.deps-cache.outputs.cache-hit != 'true'
      - run: yarn build:lib
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-24.11.0-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-yarn-
      - run: corepack enable
      - run: yarn install --immutable
        if: steps.deps-cache.outputs.cache-hit != 'true'
      - run: yarn lint
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-24.11.0-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-yarn-
      - run: corepack enable
      - run: yarn install --immutable
        if: steps.deps-cache.outputs.cache-hit != 'true'
      - run: yarn build:lib
      - run: yarn test
  deploy-demo:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    name: Deploy Demo
    runs-on: ubuntu-latest
    needs: [prepare, build, lint, test]
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-24.11.0-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-yarn-
      - run: corepack enable
      - run: yarn install --immutable
        if: steps.deps-cache.outputs.cache-hit != 'true'
      - run: yarn build:lib
      - run: yarn build:demo --base-href=/${{ github.event.repository.name }}/
      - name: 'upload'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/demo-app/browser
      - id: deploy
        name: Deploy to Github Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ github.token }}
